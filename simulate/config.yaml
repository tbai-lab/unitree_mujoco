robot: "go2"  # Robot name, "go2", "b2", "b2w", "h1", "go2w", "g1"
robot_scene: "scene.xml" # Robot scene, /unitree_robots/[robot]/scene.xml 

domain_id: 1  # Domain id
interface: "lo" # Interface 

use_joystick: 0 # Simulate Unitree WirelessController using a gamepad
joystick_type: "xbox" # support "xbox" and "switch" gamepad layout
joystick_device: "/dev/input/js0" # Device path
joystick_bits: 16 # Some game controllers may only have 8-bit accuracy

print_scene_information: 1 # Print link, joint and sensors information of robot

enable_elastic_band: 0 # Virtual spring band, used for lifting h1

# Camera / VideoServer (serves images to unitree_sdk2 VideoClient)
# camera_name: "front_camera"  # Name of a <camera> element in the MJCF model (empty or absent = disabled)
# camera_width: 640             # Image width in pixels
# camera_height: 480            # Image height in pixels
# camera_fps: 30                # Rendering frame rate

# Depth Camera / PointCloud publisher (publishes PointCloud2 via DDS)
# depth_camera_name: "front_camera"  # Name of a <camera> element in the MJCF model (empty or absent = disabled)
# depth_camera_width: 320            # Depth image width in pixels
# depth_camera_height: 240           # Depth image height in pixels
# depth_camera_fps: 10               # Depth rendering / publishing frame rate
# depth_camera_stride: 4             # Sample every Nth pixel in each dimension (1 = every pixel, 4 = 16x fewer points)
# pointcloud_topic: "rt/pointcloud"  # DDS topic name for PointCloud2 messages
